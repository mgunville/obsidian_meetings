name: meetingctl-diarization

services:
  diarizer:
    build:
      context: .
      dockerfile: docker/diarization/Dockerfile
    image: meetingctl-diarizer:local
    environment:
      DIARIZATION_OUTPUT_ROOT: /shared/diarization/jobs
      WHISPERX_MODEL: ${WHISPERX_MODEL:-large-v2}
      WHISPERX_COMPUTE_TYPE: ${WHISPERX_COMPUTE_TYPE:-int8}
      WHISPERX_BATCH_SIZE: ${WHISPERX_BATCH_SIZE:-8}
      WHISPERX_LANGUAGE: ${WHISPERX_LANGUAGE:-}
      WHISPERX_OFFLINE_MODE: ${WHISPERX_OFFLINE_MODE:-1}
      WHISPERX_DOWNLOAD_ROOT: ${WHISPERX_DOWNLOAD_ROOT:-/shared/diarization/cache/hf}
      WHISPERX_DIARIZATION_MODELS: ${WHISPERX_DIARIZATION_MODELS:-pyannote/speaker-diarization-3.1,pyannote/speaker-diarization}
      WHISPERX_DIARIZATION_EMBEDDING_FALLBACK: ${WHISPERX_DIARIZATION_EMBEDDING_FALLBACK:-1}
      WHISPERX_DIARIZATION_REQUIRE_PYANNOTE: ${WHISPERX_DIARIZATION_REQUIRE_PYANNOTE:-0}
      WHISPERX_DIARIZATION_SEGMENT_CLUSTER_DISTANCE: ${WHISPERX_DIARIZATION_SEGMENT_CLUSTER_DISTANCE:-0.08}
      WHISPERX_DIARIZATION_AUTO_CLUSTER: ${WHISPERX_DIARIZATION_AUTO_CLUSTER:-1}
      WHISPERX_DIARIZATION_AUTO_MIN_SPEAKERS: ${WHISPERX_DIARIZATION_AUTO_MIN_SPEAKERS:-2}
      WHISPERX_DIARIZATION_AUTO_MAX_SPEAKERS: ${WHISPERX_DIARIZATION_AUTO_MAX_SPEAKERS:-6}
      WHISPERX_DIARIZATION_AUTO_MIN_CLUSTER_FRACTION: ${WHISPERX_DIARIZATION_AUTO_MIN_CLUSTER_FRACTION:-0.06}
      WHISPERX_DIARIZATION_AUTO_MIN_CLUSTER_WINDOWS: ${WHISPERX_DIARIZATION_AUTO_MIN_CLUSTER_WINDOWS:-3}
      WHISPERX_DIARIZATION_AUTO_MIN_SILHOUETTE: ${WHISPERX_DIARIZATION_AUTO_MIN_SILHOUETTE:-0.12}
      WHISPERX_DIARIZATION_AUTO_SCORE_SAMPLE_MAX: ${WHISPERX_DIARIZATION_AUTO_SCORE_SAMPLE_MAX:-1000}
      WHISPERX_DIARIZATION_LABEL_SMOOTH_SPAN: ${WHISPERX_DIARIZATION_LABEL_SMOOTH_SPAN:-5}
      WHISPERX_DIARIZATION_MIN_SEGMENTS_PER_SPEAKER: ${WHISPERX_DIARIZATION_MIN_SEGMENTS_PER_SPEAKER:-2}
      WHISPERX_DIARIZATION_MIN_SEGMENT_SPEAKER_FRACTION: ${WHISPERX_DIARIZATION_MIN_SEGMENT_SPEAKER_FRACTION:-0.03}
      WHISPERX_TURN_MAX_GAP_SECONDS: ${WHISPERX_TURN_MAX_GAP_SECONDS:-1.5}
      WHISPERX_TURN_MAX_DURATION_SECONDS: ${WHISPERX_TURN_MAX_DURATION_SECONDS:-90}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
      HF_TOKEN: ${HF_TOKEN:-}
      PYANNOTE_AUTH_TOKEN: ${PYANNOTE_AUTH_TOKEN:-}
      MEETINGCTL_DIARIZATION_INSECURE_SSL: ${MEETINGCTL_DIARIZATION_INSECURE_SSL:-0}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
      HF_HOME: /shared/diarization/cache/hf
      TRANSFORMERS_CACHE: /shared/diarization/cache/transformers
      TORCH_HOME: /shared/diarization/cache/torch
    volumes:
      - ./:/workspace
      - ./shared_data:/shared
      - ${MEETINGCTL_HOST_AUDIO_PATH:-/tmp}:/host_audio:ro
      - ${MEETINGCTL_HOST_TRANSCRIPT_PATH:-/tmp}:/host_transcript:ro
    command: ["--help"]
